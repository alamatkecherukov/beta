<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мой сайт</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #1b2a22;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .block-hero {
            width: 100%;
            border-radius: 0 !important;
            padding: 60px 50px;
            background: #1b3a2a;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
        }
        .block-hero h1 {
            font-family: "Times New Roman", Times, serif;
            font-size: 48px;
            font-weight: 700;
            color: #f0e6d6;
            line-height: 1.1;
        }
        .block-hero p {
            font-size: 16px;
            color: rgba(240, 230, 214, 0.7);
            line-height: 1.6;
        }
        .block-hero .hero-btn {
            display: inline-block;
            background: #e5c19e;
            color: #1b2a22;
            padding: 14px 36px;
            border-radius: 100px;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 10px 14px 28px rgba(0,0,0,0.3);
        }

        .block {
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 12px 16px 32px rgba(0,0,0,0.4);
        }
        .block h3 {
            color: #e5c19e;
            font-size: 20px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

        .dark-card {
            border-radius: 30px; padding: 30px 20px; text-align: center;
            background: radial-gradient(circle at 0% 0%, rgba(255, 230, 200, 0.15) 0%, transparent 50%), #264034;
            box-shadow: 12px 16px 32px rgba(0,0,0,0.4);
        }
        .dark-card h4 { color: #e5c19e; font-size: 15px; font-weight: 600; }
        .dark-card p { color: rgba(255,255,255,0.25); font-size: 12px; line-height: 1.4; }

        .color-card {
            border-radius: 30px; padding: 30px 20px; text-align: center;
            background: radial-gradient(circle at 0% 0%, rgba(255, 255, 220, 0.3) 0%, transparent 40%), var(--bg);
            box-shadow: 12px 16px 32px rgba(0,0,0,0.25);
        }
        .color-card h4 { font-size: 17px; font-weight: 600; }
        .color-card p { font-size: 13px; line-height: 1.5; opacity: 0.8; }
        .card-green { --bg: #96B984; color: #1b2a22; }
        .card-brown { --bg: #875F47; color: #f0e6d6; }
        .card-beige { --bg: #C89565; color: #1b2a22; }

        .media-tile {
            border-radius: 30px; padding: 30px 24px;
            background: radial-gradient(circle at 0% 0%, rgba(255, 230, 200, 0.15) 0%, transparent 50%), #264034;
            box-shadow: 12px 16px 32px rgba(0,0,0,0.4);
            text-decoration: none; display: block;
        }
        .media-tile h3 { color: #e5c19e; font-size: 20px; font-weight: 600; margin-bottom: 6px; }
        .media-tile p { color: rgba(255,255,255,0.5); font-size: 13px; line-height: 1.5; }
        .media-tile .brand-icon { position: absolute; bottom: 16px; right: 16px; width: 28px; height: 28px; fill: #e5c19e; opacity: 0.6; }

        .text-block {
            border-radius: 30px; padding: 40px 30px;
            background: radial-gradient(circle at 0% 0%, rgba(255, 230, 200, 0.15) 0%, transparent 50%), #264034;
            box-shadow: 12px 16px 32px rgba(0,0,0,0.4);
        }
        .text-block h2 { font-family: "Times New Roman", Times, serif; font-size: 32px; color: #e5c19e; margin-bottom: 12px; }
        .text-block p { color: rgba(255,255,255,0.6); font-size: 15px; line-height: 1.7; }

        .footer {
            border-radius: 30px; padding: 24px 20px;
            background: radial-gradient(circle at 0% 0%, rgba(255, 230, 200, 0.15) 0%, transparent 50%), #1b3a2a;
            box-shadow: 12px 16px 32px rgba(0,0,0,0.4); text-align: center;
        }
        .footer .socials { display: flex; justify-content: center; gap: 16px; margin-bottom: 8px; }
        .footer .socials a { color: #e5c19e; text-decoration: none; font-size: 13px; }
        .footer p { color: rgba(255,255,255,0.3); font-size: 11px; }

        @media (max-width: 820px) {
            .block-hero { padding: 40px 20px; }
            .block-hero h1 { font-size: 32px; }
            .container { padding: 30px 16px; gap: 24px; }
            .grid-4, .grid-3 { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .dark-card, .color-card { padding: 20px 14px; }
            .dark-card h4 { font-size: 13px; }
            .color-card h4 { font-size: 15px; }
            .media-tile { padding: 20px 16px; }
            .media-tile h3 { font-size: 16px; }
            .media-tile p { font-size: 11px; }
            .media-tile .brand-icon { width: 20px; height: 20px; bottom: 12px; right: 12px; }
            .text-block { padding: 28px 20px; }
            .text-block h2 { font-size: 24px; }
            .footer { padding: 16px 12px; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        async function loadSite() {
            try {
                const resp = await fetch('data.json?t=' + Date.now());
                if (!resp.ok) throw new Error('No data');
                const data = await resp.json();
                renderPage(data);
            } catch (e) {
                document.getElementById('app').innerHTML = `<div class="container"><p style="color:rgba(255,255,255,0.3); text-align:center; padding:60px;">Нет данных. Загрузите через редактор.</p></div>`;
            }
        }

        function renderPage(data) {
            const blocks = data.pages?.home?.blocks || [];
            let html = '';
            blocks.forEach(block => {
                const isHero = block.type === 'hero';
                if (isHero) {
                    html += `
                        <div class="block-hero" style="background:${block.bgColor || '#1b3a2a'};">
                            <div style="max-width:450px;">
                                <h1>${block.title || 'Rennale<br>Renuely'}</h1>
                                <p>${block.subtitle || 'Lorem ipsum dolor sit amet.'}</p>
                                <a href="${block.btnLink || '#'}" class="hero-btn">${block.btnText || 'Heses Roge'}</a>
                            </div>
                        </div>
                    `;
                    return;
                }

                html += `<div class="block" style="background:${block.bgColor || '#264034'};">`;
                if (block.type === 'dark') {
                    html += `<h3>Тёмные плашки</h3><div class="grid-4">`;
                    block.items.forEach(item => {
                        html += `
                            <div class="dark-card">
                                <h4>${item.title || ''}</h4>
                                <p>${item.desc || ''}</p>
                            </div>
                        `;
                    });
                    html += `</div>`;
                } else if (block.type === 'color') {
                    html += `<h3>Цветные карточки</h3><div class="grid-3">`;
                    const colors = ['card-green', 'card-brown', 'card-beige'];
                    block.items.forEach((item, idx) => {
                        const colorClass = colors[idx % colors.length];
                        html += `
                            <div class="color-card ${colorClass}">
                                <h4>${item.title || ''}</h4>
                                <p>${item.desc || ''}</p>
                            </div>
                        `;
                    });
                    html += `</div>`;
                } else if (block.type === 'media') {
                    html += `<h3>Медиа-плитки</h3><div class="grid-3">`;
                    block.items.forEach(item => {
                        html += `
                            <a href="${item.link || '#'}" class="media-tile">
                                <h3>${item.title || ''}</h3>
                                <p>${item.desc || ''}</p>
                                <svg class="brand-icon" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                            </a>
                        `;
                    });
                    html += `</div>`;
                } else if (block.type === 'text') {
                    html += `
                        <div class="text-block">
                            <h2>${block.title || 'Заголовок статьи'}</h2>
                            <p>${block.content || 'Lorem ipsum dolor sit amet.'}</p>
                        </div>
                    `;
                } else if (block.type === 'article') {
                    html += `
                        <div class="text-block" style="padding:40px 30px;">
                            <h2 style="font-size:32px; margin-bottom:8px;">${block.title || 'Название статьи'}</h2>
                            <p style="font-size:16px; color:rgba(255,255,255,0.5); margin-bottom:20px;">${block.subtitle || 'Краткое описание статьи'}</p>
                            <p style="font-size:15px; color:rgba(255,255,255,0.6); line-height:1.7;">${block.content || 'Полный текст статьи.'}</p>
                        </div>
                    `;
                } else if (block.type === 'footer') {
                    html += `
                        <div class="footer">
                            <div class="socials">
                                ${(block.items || []).map(item => `<a href="${item.link || '#'}">${item.label || 'Соцсеть'}</a>`).join('')}
                            </div>
                            <p>${block.copyright || '© 2026 Rennale Renuely'}</p>
                        </div>
                    `;
                }
                html += `</div>`;
            });

            document.getElementById('app').innerHTML = html;
        }

        loadSite();
    </script>
</body>
</html>
